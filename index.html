<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <title>~/tamino.dev/main.ts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <link rel="apple-touch-icon" sizes="180x180" href="/logo@180x180.png" />
    <meta name="apple-mobile-web-app-title" content="~/tamino.dev/main.ts" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#272822" />

    <link rel="icon" type="image/png" href="/logo@32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/logo@16x16.png" sizes="16x16" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#272822" />
    <meta name="application-name" content="~/tamino.dev/main.ts" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <meta
      name="description"
      content="Portfolio of Tamino Martinius - Head of Development at shyftplan"
    />
    <meta
      name="keywords"
      content="Tamino, Martinius, Developer, Backend, Frontend, Head of Development, Lead Engineering"
    />

    <style>
      html,
      body {
        padding-top: 0.2rem;
        font-family: 'Fira Code', monospace;
        font-size: 2vw;
      }

      @media screen and (min-width: 1024px) {
        html,
        body {
          font-size: 20px;
        }
      }

      body {
        --color-background: #272822;
        --color-white-space: #464741;
        --color-collapsed: #464741;
        --color-comment: #75715e;
        --color-variable: #f8f8f2;
        --color-expression: #f8f8f2;
        --color-storage-type: #66d9ef;
        --color-keyword: #f92672;
        --color-type: #a6e22e;
        --color-class: #a6e22e;
        --color-string: #e6db74;
        --color-constant: #ae81ff;
        --color-number: #ae81ff;

        --color-zsh-text: #899;
        --color-zsh-path-background: #2e8ccf;
        --color-zsh-path-foreground: #000;
        --color-zsh-branch-background: #85981c;
        --color-zsh-branch-foreground: #000;
        --color-zsh-command-valid: #85981c;
        --color-zsh-command-invalid: #c14c22;
        --color-zsh-args: #cdd;
        --color-zsh-args-autocomplete: #566;

        margin: 0.3rem;
        background-color: var(--color-background);
      }

      .hidden {
        display: none;
      }

      .loader {
        color: var(--color-zsh-text);
        font-size: 0;
        padding-bottom: 0.5rem;
      }

      .loader .now {
        display: inline;
      }

      .loader span {
        font-size: 1rem;
      }

      .loader .branch:before,
      .loader .command:before {
        content: '';
        display: inline-block;
        width: 0;
        height: 0;
        border: 0.6rem solid transparent;
        vertical-align: -0.25rem;
      }

      .loader .path {
        background-color: var(--color-zsh-path-background);
        color: var(--color-zsh-path-foreground);
        padding-right: 1rem;
      }

      .loader .branch {
        background-color: var(--color-zsh-branch-background);
        color: var(--color-zsh-branch-foreground);
        padding-right: 1rem;
      }

      .loader .branch:before {
        border-left-color: var(--color-zsh-path-background);
      }

      .loader .command:after {
        color: var(--color-zsh-command-valid);
      }

      .loader .command:before {
        border-left-color: var(--color-zsh-branch-background);
      }

      .loader .args:before {
        padding-left: 1rem;
        color: var(--color-zsh-args);
      }

      .loader .args:after {
        color: var(--color-zsh-args-autocomplete);
      }

      .step-1 .loader .command:after {
        content: 'c';
        color: var(--color-zsh-command-invalid);
      }
      .step-2 .loader .command:after {
        content: 'ca';
        color: var(--color-zsh-command-invalid);
      }
      .step-3 .loader .command:after {
        content: 'cat';
      }

      .step-4 .loader .command:after {
        content: 'cat';
      }
      .step-4 .loader .args:before {
        content: 'm';
      }
      .step-4 .loader .args:after {
        content: 'ain.ts';
      }

      .step-5 .loader .command:after {
        content: 'cat';
      }
      .step-5 .loader .args:before {
        content: 'ma';
      }
      .step-5 .loader .args:after {
        content: 'in.ts';
      }

      .step-6 .loader .command:after {
        content: 'cat';
      }
      .step-6 .loader .args:before {
        content: 'main.ts';
      }

      .step-7 .loader .command:after {
        content: 'cat';
      }
      .step-7 .loader .args:before {
        content: 'main.ts';
      }
      .step-7 #root {
        display: block;
      }

      .lang-ruby.step-4 .loader .args:after {
        content: 'ain.rb';
      }
      .lang-ruby.step-5 .loader .args:after {
        content: 'in.rb';
      }
      .lang-ruby.step-6 .loader .args:before {
        content: 'main.rb';
      }
      .lang-ruby.step-7 .loader .args:before {
        content: 'main.rb';
      }

      .lang-javascript.step-4 .loader .args:after {
        content: 'ain.js';
      }
      .lang-javascript.step-5 .loader .args:after {
        content: 'in.js';
      }
      .lang-javascript.step-6 .loader .args:before {
        content: 'main.js';
      }
      .lang-javascript.step-7 .loader .args:before {
        content: 'main.js';
      }
    </style>
  </head>
  <body>
    <noscript>
      Please enable JavaScript to see this page!
    </noscript>
    <div class="loader hidden" id="loader">
      <div class="line">
        <span> Last login: <span id="loader-now"></span> on ttys007 </span>
      </div>
      <div class="line">
        <span class="path">~/tamino.dev</span>
        <span class="branch"> main</span>
        <span class="command"></span>
        <span class="args"></span>
      </div>
    </div>
    <script>
      var $loader = document.getElementById('loader');
      var $now = document.getElementById('loader-now');
      var $body = document.body;
      $now.textContent = ' ' + new Date().toString().substr(0, 24) + ' ';
      $loader.classList.remove('hidden');
      for (var i = 1; i <= 7; i++) {
        (function(i) {
          setTimeout(function() {
            $body.classList.remove('step-' + (i - 1));
            $body.classList.add('step-' + i);
          }, i * 250 + ~~(Math.random() * 50));
        })(i);
      }
    </script>
    <div id="root" class="hidden"></div>
    <link
      rel="stylesheet"
      href="https://cdn.rawgit.com/tonsky/FiraCode/1.204/distr/fira_code.css"
    />
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
